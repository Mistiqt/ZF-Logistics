<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magacin - ZF Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --zf-blue: #00549f; --zf-dark: #002e5d; --border-color: #e2e8f0;
            --bg: #f8fafc; --success-green: #10b981; --success-bg: #f0fdf4;
            --text-main: #1e293b; --text-muted: #64748b; --container-width: 1250px;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; color: var(--text-main); -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; min-height: 100vh; }
        header { background: white; border-bottom: 1px solid var(--border-color); height: 90px; display: flex; justify-content: center; position: sticky; top: 0; z-index: 100; }
        .header-content { width: var(--container-width); max-width: 100%; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .zf-logo-square { background: var(--zf-blue); color: white; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; border-radius: 4px; font-size: 22px; }
        .header-title-wrapper h1 { margin: 0; font-size: 22px; text-transform: uppercase; font-weight: 800; color: var(--zf-dark); line-height: 1; letter-spacing: -0.02em; }
        .page-description { font-size: 13px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
        .btn-logout { background: white; border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: #be123c; }
        .container { width: var(--container-width); max-width: 100%; margin: 30px auto; padding: 0 20px; box-sizing: border-box; flex: 1; }
        .section-title { font-size: 14px; font-weight: 800; display: flex; align-items: center; gap: 8px; text-transform: uppercase; margin: 0; color: var(--zf-dark); }
        .ramp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin: 20px 0 35px 0; }
        .ramp-card { background: white; border: 1px solid #cbd5e1; border-style: dashed; border-radius: 6px; padding: 12px; min-height: 250px; display: flex; flex-direction: column; }
        .ramp-card.occupied { border: 2px solid var(--success-green); background: var(--success-bg); border-style: solid; }
        .ramp-top { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 800; font-size: 13px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 8px; }
        .info-container { margin: 5px 0; }
        .company-name { font-size: 16px; font-weight: 700; color: #334155; margin-bottom: 2px; display: block; }
        .plate-number { font-size: 20px; font-weight: 800; color: var(--zf-blue); margin-bottom: 10px; display: block; }
        .info-list { display: flex; flex-direction: column; gap: 5px; }
        .info-item { display: flex; align-items: center; font-size: 13.5px; line-height: 1.3; }
        .info-item i { width: 22px; color: var(--zf-blue); font-size: 13px; margin-right: 6px; text-align: center; }
        .info-value { color: var(--text-main); font-weight: 600; }
        #waitingContainer { height: 500px; overflow-y: auto; padding: 15px; background: #f1f5f9; border: 2px solid var(--border-color); border-radius: 8px; }
        .waiting-card { background: white; border: 1px solid var(--border-color); padding: 15px 20px; border-radius: 8px; display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 12px; }
        .btn-unload { background: var(--success-green); color: white; border: none; width: 100%; padding: 12px; border-radius: 4px; font-weight: 800; cursor: pointer; margin-top: auto; font-size: 13px; text-transform: uppercase; }
        .btn-assign { background: var(--zf-blue); color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: 800; cursor: pointer; font-size: 13px; text-transform: uppercase; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 450px; position: relative; }
        .ramp-selection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .ramp-btn { background: var(--zf-blue); color: white; border: none; padding: 15px 10px; font-weight: 800; cursor: pointer; border-radius: 6px; }
        .pallet-input { width: 100%; padding: 15px; border: 2px solid var(--border-color); border-radius: 6px; font-size: 24px; font-weight: 800; text-align: center; margin: 20px 0; }
        .footer { background: white; border-top: 1px solid var(--border-color); padding: 20px 0; text-align: center; margin-top: 40px; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <div class="zf-logo-square"><i class="fas fa-warehouse"></i></div>
                <div class="header-title-wrapper"><h1>MAGACIN</h1><div class="page-description">Operativni panel rampi</div></div>
            </div>
            <button class="btn-logout" onclick="window.location.href='login.html'"><i class="fas fa-sign-out-alt"></i> Odjava</button>
        </div>
    </header>

    <div class="container">
        <div class="section-title"><i class="fas fa-truck-loading" style="color:var(--zf-blue)"></i> Status Rampi</div>
        <div id="rampsContainer" class="ramp-grid"></div>

        <div class="section-title" style="margin-top:30px;">
            <i class="far fa-clock" style="color:#f97316"></i> Kamioni na čekanju 
            <span id="waitingCount" style="background:#ffedd5; color:#9a3412; padding:2px 8px; border-radius:4px; font-size:11px; margin-left:10px;">0</span>
        </div>
        <div id="waitingContainer" style="margin-top:15px;"></div>
    </div>

    <div id="rampModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin:0; font-size:18px; color:var(--zf-blue); font-weight: 800;">IZABERITE RAMPU</h2>
            <div id="modalRampGrid" class="ramp-selection-grid"></div>
            <button onclick="closeModals()" style="margin-top:15px; width:100%; padding:10px; border:none; background:#f1f5f9; cursor:pointer; border-radius:6px;">Odustani</button>
        </div>
    </div>

    <div id="palletModal" class="modal-overlay">
        <div class="modal-content">
            <h2 style="margin:0; font-size:18px; color:var(--zf-blue); font-weight: 800;">UNESITE BROJ PALETA</h2>
            <input type="number" id="palletInput" class="pallet-input" placeholder="0">
            <button id="finalizeBtn" class="btn-unload" onclick="finalizeUnload()">ZAVRŠI ISTOVAR</button>
        </div>
    </div>

    <footer class="footer"><p>Aplikaciju razvio <b>Dušan Kostić</b> © 2026.</p></footer>

    <script>
        const SB_URL = "https://ljbqiavcibdlgmkkytkv.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqYnFpYXZjaWJkbGdta2t5dGt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjI1MjksImV4cCI6MjA4OTA5ODUyOX0.YduSzl6hw4blu__CHbt4g7mrkjjaUUwbEY-HuFTEGIE";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let selectedTruckId = null;
        const rampList = ["RAMPA 1", "RAMPA 2", "RAMPA 3", "RAMPA 4", "TEHNIČKA RAMPA", "ROLO RAMPA"];

        async function fetchData() {
            const { data: trucks, error } = await _supabase.from('zf_trucks').select('*').not('status', 'in', '("IZAŠAO", "ZA IZLAZ")');
            if (error) return;

            const rContainer = document.getElementById('rampsContainer');
            const wContainer = document.getElementById('waitingContainer');
            rContainer.innerHTML = ''; wContainer.innerHTML = '';

            const waiting = trucks.filter(t => t.status === 'NA ČEKANJU');
            document.getElementById('waitingCount').innerText = waiting.length;

            rampList.forEach(name => {
                const t = trucks.find(x => x.status === 'NA RAMPI' && x.ramp === name);
                const card = document.createElement('div');
                card.className = `ramp-card ${t ? 'occupied' : ''}`;
                
                if (t) {
                    card.innerHTML = `
                        <div class="ramp-top"><span>${name}</span><span style="color:var(--success-green)">ZAUZETO</span></div>
                        <div class="info-container">
                            <span class="company-name">${t.company}</span>
                            <span class="plate-number">${t.plate}</span>
                            <div class="info-list">
                                <div class="info-item"><i class="fas fa-truck"></i> <span class="info-value">${t.vehicle || '/'}</span></div>
                                <div class="info-item"><i class="fas fa-boxes"></i> <span class="info-value">${t.goods || '/'}</span></div>
                                <div class="info-item" style="margin-top:3px;"><span class="info-value" style="font-size:12px; color:var(--text-muted);"><b>Na rampi od:</b> ${t.ramp_time || '/'}</span></div>
                            </div>
                        </div>
                        <button class="btn-unload" onclick="openPallet(${t.id})"><i class="fas fa-check"></i> ISTOVAR ZAVRŠEN</button>`;
                } else {
                    card.innerHTML = `<div class="ramp-top">${name} <span style="color:var(--text-muted); font-weight:500">SLOBODNO</span></div><div style="margin:auto; color:#cbd5e1; text-align:center; font-size: 13px; font-weight:500;">Dostupno za dodelu</div>`;
                }
                rContainer.appendChild(card);
            });

            waiting.forEach(t => {
                const card = document.createElement('div');
                card.className = 'waiting-card';
                card.innerHTML = `
                    <div class="info-container" style="margin:0;">
                        <span class="company-name">${t.company}</span>
                        <span class="plate-number">${t.plate}</span>
                        <div class="info-list">
                            <div class="info-item"><i class="fas fa-truck"></i> <span class="info-value">${t.vehicle || '/'}</span></div>
                            <div class="info-item" style="margin-top:3px;"><span class="info-value" style="font-size:12px; color:var(--text-muted);"><b>Najavljen:</b> ${t.date || '/'} ${t.time || '/'}</span></div>
                        </div>
                    </div>
                    <button class="btn-assign" onclick="openAssign(${t.id})">DODELI RAMPU</button>`;
                wContainer.appendChild(card);
            });
        }

        function openAssign(id) {
            selectedTruckId = id;
            const grid = document.getElementById('modalRampGrid');
            grid.innerHTML = '';
            rampList.forEach(r => {
                const btn = document.createElement('button');
                btn.className = 'ramp-btn'; btn.innerText = r;
                btn.onclick = () => assign(r);
                grid.appendChild(btn);
            });
            document.getElementById('rampModal').style.display = 'flex';
        }

        async function assign(rampName) {
            const sad = new Date().toLocaleTimeString('sr-RS', {hour: '2-digit', minute:'2-digit'});
            await _supabase.from('zf_trucks').update({ status: 'NA RAMPI', ramp: rampName, ramp_time: sad }).eq('id', selectedTruckId);
            closeModals(); fetchData();
        }

        function openPallet(id) { selectedTruckId = id; document.getElementById('palletModal').style.display = 'flex'; }
        
        async function finalizeUnload() {
            const p = document.getElementById('palletInput').value;
            await _supabase.from('zf_trucks').update({ status: 'ISTOVAREN', pallets: p }).eq('id', selectedTruckId);
            closeModals(); fetchData();
        }

        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        fetchData();
        setInterval(fetchData, 5000);
    </script>
</body>
</html>
