<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magacin - ZF Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --zf-blue: #00549f;
            --zf-dark: #002e5d;
            --border-color: #e2e8f0;
            --bg: #f8fafc;
            --success-green: #10b981;
            --success-bg: #f0fdf4;
            --text-main: #1e293b;
            --text-muted: #64748b;
            --container-width: 1250px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        header {
            background: white;
            border-bottom: 1px solid var(--border-color);
            height: 90px;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            width: var(--container-width);
            max-width: 100%;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-sizing: border-box;
        }

        .zf-logo-square {
            background: var(--zf-blue); color: white;
            width: 44px; height: 44px;
            display: flex; justify-content: center; align-items: center;
            border-radius: 4px; font-size: 22px;
        }

        .header-title-wrapper h1 { 
            margin: 0; font-size: 22px; text-transform: uppercase; 
            font-weight: 800; color: var(--zf-dark); letter-spacing: -0.02em;
        }

        .btn-logout {
            background: white; border: 1px solid var(--border-color);
            padding: 8px 16px; border-radius: 4px; cursor: pointer;
            font-size: 13px; font-weight: 600; color: #be123c;
        }

        .container { 
            width: var(--container-width);
            max-width: 100%;
            margin: 30px auto; padding: 0 20px; box-sizing: border-box; flex: 1;
        }

        /* RAMPE GRID */
        .ramp-grid {
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 35px;
        }

        .ramp-card {
            background: white; border: 1px solid #cbd5e1; border-style: dashed;
            border-radius: 6px; padding: 12px; min-height: 250px;
            display: flex; flex-direction: column; transition: all 0.2s;
        }

        .ramp-card.occupied { border: 2px solid var(--success-green); background: var(--success-bg); border-style: solid; }

        .ramp-top { 
            display: flex; justify-content: space-between; margin-bottom: 12px; 
            font-weight: 800; font-size: 13px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 8px; 
        }

        .company-name { font-size: 16px; font-weight: 700; color: #334155; }
        .plate-number { font-size: 20px; font-weight: 800; color: var(--zf-blue); margin-bottom: 10px; display: block; }

        .info-list { display: flex; flex-direction: column; gap: 5px; }
        .info-item { display: flex; align-items: center; font-size: 13.5px; }
        .info-item i { width: 22px; color: var(--zf-blue); text-align: center; margin-right: 6px; }

        /* LISTA ČEKANJA */
        #waitingContainer {
            height: 500px; overflow-y: auto; padding: 15px;
            background: #f1f5f9; border: 2px solid var(--border-color); border-radius: 8px;
        }

        .waiting-card {
            background: white; padding: 15px 20px; border-radius: 8px; 
            display: flex; justify-content: space-between; margin-bottom: 12px;
            border: 1px solid var(--border-color);
        }

        .btn-assign { background: var(--zf-blue); color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: 800; cursor: pointer; }
        .btn-unload { background: var(--success-green); color: white; border: none; padding: 12px; border-radius: 4px; font-weight: 800; cursor: pointer; margin-top: auto; width: 100%; }

        /* MODALI */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(15, 23, 42, 0.8); display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 450px; position: relative; }
        .ramp-selection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-top: 20px; }
        .ramp-btn { background: var(--zf-blue); color: white; border: none; padding: 15px; font-weight: 800; cursor: pointer; border-radius: 6px; }
        .ramp-btn:disabled { background: #e2e8f0; color: #94a3b8; cursor: not-allowed; }
        
        .pallet-input { width: 100%; padding: 15px; font-size: 32px; text-align: center; border: 2px solid var(--border-color); margin: 20px 0; border-radius: 8px; font-weight: 900; box-sizing: border-box; }
    </style>
</head>
<body>

<header>
    <div class="header-content">
        <div style="display:flex; align-items:center; gap:15px;">
            <div class="zf-logo-square"><i class="fas fa-warehouse"></i></div>
            <div class="header-title-wrapper">
                <h1>MAGACIN</h1>
                <div style="font-size:13px; color:var(--text-muted);">Operativni panel rampi</div>
            </div>
        </div>
        <button class="btn-logout" onclick="location.href='login.html'">ODJAVA</button>
    </div>
</header>

<div class="container">
    <div class="section-title" style="margin-bottom:20px; font-weight:800; color:var(--zf-blue); text-transform:uppercase;">
        <i class="fas fa-truck-loading"></i> Status Rampi
    </div>
    <div id="rampsContainer" class="ramp-grid"></div>

    <div style="display:flex; justify-content:space-between; align-items:center; margin: 30px 0 15px 0;">
        <div style="font-weight:800; text-transform:uppercase; font-size:14px;">
            <i class="far fa-clock" style="color:#f97316"></i> Kamioni na čekanju 
            <span id="waitingCount" style="background:#ffedd5; color:#9a3412; padding:2px 8px; border-radius:4px; margin-left:10px;">0</span>
        </div>
    </div>
    <div id="waitingContainer"></div>
</div>

<div id="rampModal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="margin:0; font-size:18px; color:var(--zf-blue); font-weight:900;">DODELI RAMPU</h2>
        <div id="modalRampGrid" class="ramp-selection-grid"></div>
        <button onclick="closeModals()" style="width:100%; margin-top:15px; padding:10px; border:none; background:#f1f5f9; cursor:pointer; border-radius:6px;">Odustani</button>
    </div>
</div>

<div id="palletModal" class="modal-overlay">
    <div class="modal-content">
        <h2 style="margin:0; font-size:18px; color:var(--zf-blue); font-weight:900; text-align:center;">BROJ PALETA</h2>
        <input type="number" id="palletInput" class="pallet-input" placeholder="0">
        <button id="finalizeBtn" class="btn-unload" onclick="finalizeUnload()">ZAVRŠI ISTOVAR</button>
    </div>
</div>

<script>
    const SB_URL = "https://ljbqiavcibdlgmkkytkv.supabase.co";
    const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqYnFpYXZjaWJkbGdta2t5dGt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjI1MjksImV4cCI6MjA4OTA5ODUyOX0.YduSzl6hw4blu__CHbt4g7mrkjjaUUwbEY-HuFTEGIE";
    const _supabase = supabase.createClient(SB_URL, SB_KEY);

    const rampList = ["RAMPA 1", "RAMPA 2", "RAMPA 3", "RAMPA 4", "TEHNIČKA RAMPA", "ROLO RAMPA"];
    let lastWaitingCount = -1;
    let selectedTruckId = null;

    // AUDIO NOTIFIKACIJA IZ TVOG KODA
    function playNotification() {
        try {
            const context = new (window.AudioContext || window.webkitAudioContext)();
            const oscillator = context.createOscillator();
            const gainNode = context.createGain();
            oscillator.frequency.setValueAtTime(880, context.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.01, context.currentTime + 0.2);
            oscillator.connect(gainNode); gainNode.connect(context.destination);
            oscillator.start(); oscillator.stop(context.currentTime + 0.2);
        } catch (e) { console.log("Audio blocked"); }
    }

    async function fetchData() {
        const { data: trucks, error } = await _supabase
            .from('zf_trucks')
            .select('*')
            .not('status', 'eq', 'IZAŠAO');

        if (error) return;

        renderRamps(trucks);
        renderWaiting(trucks);
    }

    function renderRamps(trucks) {
        const container = document.getElementById('rampsContainer');
        container.innerHTML = '';

        rampList.forEach(rName => {
            const t = trucks.find(tr => tr.ramp === rName && tr.status === 'NA RAMPI');
            const card = document.createElement('div');
            card.className = `ramp-card ${t ? 'occupied' : ''}`;

            if (t) {
                card.innerHTML = `
                    <div class="ramp-top"><span>${rName}</span><span style="color:var(--success-green)">ZAUZETO</span></div>
                    <div class="info-container">
                        <span class="company-name">${t.company}</span>
                        <span class="plate-number">${t.plate}</span>
                        <div class="info-list">
                            <div class="info-item"><i class="fas fa-truck"></i> <span>${t.vehicle || '/'}</span></div>
                            <div class="info-item"><i class="fas fa-phone"></i> <span>${t.phone || '/'}</span></div>
                            <div class="info-item" style="margin-top:5px; font-size:11px; color:var(--text-muted);">
                                <b>Na rampi od:</b> ${t.ramp_start_date || ''} ${t.ramp_start_time || '/'}
                            </div>
                        </div>
                    </div>
                    <button class="btn-unload" onclick="openPalletModal(${t.id})">ISTOVAR ZAVRŠEN</button>
                `;
            } else {
                card.innerHTML = `<div class="ramp-top">${rName} <span style="color:var(--text-muted)">SLOBODNO</span></div>
                                  <div style="margin:auto; color:#cbd5e1; font-weight:500;">Dostupno za dodelu</div>`;
            }
            container.appendChild(card);
        });
    }

    function renderWaiting(trucks) {
        const container = document.getElementById('waitingContainer');
        const waiting = trucks.filter(t => t.status === 'NA ČEKANJU');
        
        container.innerHTML = '';
        document.getElementById('waitingCount').innerText = waiting.length;

        if (lastWaitingCount !== -1 && waiting.length > lastWaitingCount) playNotification();
        lastWaitingCount = waiting.length;

        waiting.forEach(t => {
            const card = document.createElement('div');
            card.className = 'waiting-card';
            card.innerHTML = `
                <div>
                    <span class="company-name">${t.company}</span>
                    <span class="plate-number">${t.plate}</span>
                    <div style="font-size:12px; color:var(--text-muted);">Najavljen: ${t.date || ''} ${t.time || ''}</div>
                </div>
                <button class="btn-assign" onclick="openRampModal(${t.id})">DODELI RAMPU</button>
            `;
            container.appendChild(card);
        });
    }

    async function openRampModal(id) {
        selectedTruckId = id;
        const { data: busy } = await _supabase.from('zf_trucks').select('ramp').eq('status', 'NA RAMPI');
        const busyRamps = busy.map(b => b.ramp);

        const grid = document.getElementById('modalRampGrid');
        grid.innerHTML = '';
        rampList.forEach(r => {
            const btn = document.createElement('button');
            btn.className = 'ramp-btn';
            btn.innerText = r;
            btn.disabled = busyRamps.includes(r);
            btn.onclick = () => assignRamp(r);
            grid.appendChild(btn);
        });
        document.getElementById('rampModal').style.display = 'flex';
    }

    async function assignRamp(rampName) {
        const now = new Date();
        const dateStr = now.toLocaleDateString('sr-RS') + ".";
        const timeStr = now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'});

        await _supabase.from('zf_trucks').update({
            status: 'NA RAMPI',
            ramp: rampName,
            ramp_start_date: dateStr,
            ramp_start_time: timeStr
        }).eq('id', selectedTruckId);

        closeModals(); fetchData();
    }

    function openPalletModal(id) {
        selectedTruckId = id;
        document.getElementById('palletInput').value = '';
        document.getElementById('palletModal').style.display = 'flex';
    }

    async function finalizeUnload() {
        const p = document.getElementById('palletInput').value;
        if(!p) return alert("Unesi palete!");

        await _supabase.from('zf_trucks').update({
            status: 'ISTOVAREN',
            pallets: p
        }).eq('id', selectedTruckId);

        closeModals(); fetchData();
    }

    function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

    fetchData();
    setInterval(fetchData, 3000);
</script>
</body>
</html>
