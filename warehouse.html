<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Magacin - ZF Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS ostaje identičan tvom originalu */
        :root {
            --zf-blue: #00549f; --zf-dark: #002e5d; --border-color: #e2e8f0;
            --bg: #f8fafc; --success-green: #10b981; --success-bg: #f0fdf4;
            --text-main: #1e293b; --text-muted: #64748b; --container-width: 1250px;
        }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }
        header { background: white; border-bottom: 1px solid var(--border-color); height: 90px; display: flex; justify-content: center; position: sticky; top: 0; z-index: 100; }
        .header-content { width: var(--container-width); max-width: 100%; padding: 0 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .zf-logo-square { background: var(--zf-blue); color: white; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; border-radius: 4px; font-size: 22px; }
        .header-title-wrapper h1 { margin: 0; font-size: 22px; text-transform: uppercase; font-weight: 800; color: var(--zf-dark); letter-spacing: -0.02em; }
        .page-description { font-size: 13px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }
        .btn-logout { background: white; border: 1px solid var(--border-color); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; color: #be123c; display: flex; align-items: center; gap: 8px; }
        .container { width: var(--container-width); max-width: 100%; margin: 30px auto; padding: 0 20px; flex: 1; box-sizing: border-box; }
        .ramp-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; margin-bottom: 35px; }
        .ramp-card { background: white; border: 1px solid #cbd5e1; border-style: dashed; border-radius: 6px; padding: 12px; min-height: 250px; display: flex; flex-direction: column; }
        .ramp-card.occupied { border: 2px solid var(--success-green); background: var(--success-bg); border-style: solid; }
        .ramp-top { display: flex; justify-content: space-between; margin-bottom: 12px; font-weight: 800; font-size: 13px; border-bottom: 1px solid rgba(0,0,0,0.05); padding-bottom: 8px; }
        .company-name { font-size: 16px; font-weight: 700; color: #334155; }
        .plate-number { font-size: 20px; font-weight: 800; color: var(--zf-blue); display: block; margin-bottom: 10px; }
        .info-item { display: flex; align-items: center; font-size: 13.5px; margin-bottom: 4px; }
        .info-item i { width: 22px; color: var(--zf-blue); }
        #waitingContainer { height: 500px; overflow-y: auto; padding: 15px; background: #f1f5f9; border: 2px solid var(--border-color); border-radius: 8px; }
        .waiting-card { background: white; border: 1px solid var(--border-color); padding: 15px 20px; border-radius: 8px; display: flex; justify-content: space-between; margin-bottom: 12px; }
        .btn-assign { background: var(--zf-blue); color: white; border: none; padding: 12px 25px; border-radius: 6px; font-weight: 800; cursor: pointer; }
        .btn-unload { background: var(--success-green); color: white; border: none; width: 100%; padding: 12px; border-radius: 4px; font-weight: 800; cursor: pointer; margin-top: auto; }
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15,23,42,0.8); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 12px; width: 400px; }
        .ramp-selection-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin-top: 20px; }
        .ramp-btn { background: var(--zf-blue); color: white; border: none; padding: 10px; border-radius: 4px; cursor: pointer; font-weight: 700; }
        .pallet-input { width: 100%; padding: 10px; font-size: 20px; text-align: center; margin: 15px 0; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <div class="zf-logo-square"><i class="fas fa-warehouse"></i></div>
                <div class="header-title-wrapper"><h1>MAGACIN</h1><div class="page-description">Operativni panel rampi</div></div>
            </div>
            <button class="btn-logout" onclick="window.location.href='login.html'"><i class="fas fa-sign-out-alt"></i> Odjava</button>
        </div>
    </header>

    <div class="container">
        <div class="section-title" style="margin-bottom: 15px; font-weight: 800;"><i class="fas fa-truck-loading"></i> STATUS RAMPI</div>
        <div id="rampsContainer" class="ramp-grid"></div>

        <div class="section-header-flex" style="display:flex; justify-content:space-between; align-items:center; margin: 20px 0 10px 0;">
            <div style="font-weight:800; font-size:14px;"><i class="far fa-clock"></i> NA ČEKANJU <span id="waitingCount" style="background:orange; color:white; padding:2px 6px; border-radius:4px;">0</span></div>
            <button onclick="render()" style="background:none; border:none; cursor:pointer; color:var(--text-muted);"><i class="fas fa-sync-alt"></i></button>
        </div>
        <div id="waitingContainer"></div>
    </div>

    <div id="rampModal" class="modal-overlay">
        <div class="modal-content">
            <h3>DODELI RAMPU</h3>
            <div id="modalRampGrid" class="ramp-selection-grid"></div>
            <button onclick="closeModals()" style="width:100%; margin-top:10px;">Odustani</button>
        </div>
    </div>

    <div id="palletModal" class="modal-overlay">
        <div class="modal-content">
            <h3>BROJ PALETA</h3>
            <input type="number" id="palletInput" class="pallet-input" placeholder="0">
            <button id="finalizeBtn" onclick="finalizeUnload()" style="width:100%; padding:10px; background:var(--success-green); color:white; border:none; font-weight:800;">ZAVRŠI</button>
        </div>
    </div>

    <script>
        // --- KONFIGURACIJA (STAVI SVOJE PODATKE) ---
        const SUPABASE_URL = 'https://tvoj-projekat.supabase.co';
        const SUPABASE_KEY = 'tvoj-anon-key';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        const rampList = ["RAMPA 1", "RAMPA 2", "RAMPA 3", "RAMPA 4", "TEHNIČKA RAMPA", "ROLO RAMPA"];
        let selectedTruckId = null;

        // Funkcija za povlačenje podataka
        async function render() {
            const { data: trucks, error } = await supabase
                .from('zf_trucks')
                .select('*')
                .or('status.eq.NA ČEKANJU,status.eq.NA RAMPI');

            if (error) return console.error(error);

            const rContainer = document.getElementById('rampsContainer');
            const wContainer = document.getElementById('waitingContainer');
            rContainer.innerHTML = '';
            wContainer.innerHTML = '';

            // Rampu po rampu proveravamo
            rampList.forEach(rName => {
                const truck = trucks.find(t => t.ramp === rName && t.status === 'NA RAMPI');
                const card = document.createElement('div');
                card.className = `ramp-card ${truck ? 'occupied' : ''}`;
                
                if (truck) {
                    card.innerHTML = `
                        <div class="ramp-top"><span>${rName}</span><span style="color:green">ZAUZETO</span></div>
                        <span class="company-name">${truck.company}</span>
                        <span class="plate-number">${truck.plate}</span>
                        <div class="info-item"><i class="fas fa-boxes"></i> ${truck.goods}</div>
                        <div class="info-item"><i class="fas fa-clock"></i> ${truck.ramp_start_time || ''}</div>
                        <button class="btn-unload" onclick="openPalletModal(${truck.id})">KRAJ ISTOVARA</button>`;
                } else {
                    card.innerHTML = `<div class="ramp-top">${rName} <span>SLOBODNO</span></div>`;
                }
                rContainer.appendChild(card);
            });

            // Kamioni na čekanju
            const waiting = trucks.filter(t => t.status === 'NA ČEKANJU');
            document.getElementById('waitingCount').innerText = waiting.length;
            
            waiting.forEach(t => {
                const div = document.createElement('div');
                div.className = 'waiting-card';
                div.innerHTML = `
                    <div>
                        <div class="company-name">${t.company}</div>
                        <div class="plate-number">${t.plate}</div>
                        <div style="font-size:12px; color:gray;">Najavljen: ${t.time}</div>
                    </div>
                    <button class="btn-assign" onclick="openRampModal(${t.id})">DODELI RAMPU</button>`;
                wContainer.appendChild(div);
            });
        }

        // Dodeljivanje rampe
        async function openRampModal(id) {
            selectedTruckId = id;
            const { data: occupied } = await supabase.from('zf_trucks').select('ramp').eq('status', 'NA RAMPI');
            const taken = occupied.map(o => o.ramp);
            
            const grid = document.getElementById('modalRampGrid');
            grid.innerHTML = '';
            rampList.forEach(r => {
                const btn = document.createElement('button');
                btn.className = 'ramp-btn';
                btn.innerText = r;
                if (taken.includes(r)) btn.disabled = true;
                else btn.onclick = () => assignRamp(r);
                grid.appendChild(btn);
            });
            document.getElementById('rampModal').style.display = 'flex';
        }

        async function assignRamp(rampName) {
            const now = new Date();
            await supabase.from('zf_trucks').update({
                status: 'NA RAMPI',
                ramp: rampName,
                ramp_start_time: now.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}),
                ramp_start_date: now.toLocaleDateString()
            }).eq('id', selectedTruckId);
            closeModals();
            render();
        }

        // Završetak istovara
        function openPalletModal(id) {
            selectedTruckId = id;
            document.getElementById('palletModal').style.display = 'flex';
        }

        async function finalizeUnload() {
            const p = document.getElementById('palletInput').value;
            await supabase.from('zf_trucks').update({
                status: 'ISTOVAREN',
                pallets: p,
                unloaded_time: new Date().toLocaleTimeString()
            }).eq('id', selectedTruckId);
            closeModals();
            render();
        }

        function closeModals() { document.querySelectorAll('.modal-overlay').forEach(m => m.style.display = 'none'); }

        render();
        setInterval(render, 5000); // Osvežava na 5 sekundi
    </script>
</body>
</html>
