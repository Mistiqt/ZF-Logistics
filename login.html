<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZF Logistics - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --zf-blue: #00549f;
            --zf-dark: #002e5d;
            --border: #e2e8f0;
            --text-dark: #1e293b;
            --text-gray: #64748b;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .login-container { display: flex; min-height: 100vh; width: 100vw; flex-direction: row; }

        .brand-side {
            flex: 1;
            background: #00549f; /* Ako slika ne učita, plava pozadina */
            background: linear-gradient(rgba(0, 84, 159, 0.88), rgba(0, 84, 159, 0.88)), url('pictures/images_enhanced.jpg') no-repeat center center;
            background-size: cover;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            color: white;
            box-sizing: border-box;
        }

        .brand-content h1 { font-size: 64px; font-weight: 900; margin: 0; letter-spacing: -2px; }
        .brand-content p.subtitle { font-size: 24px; opacity: 0.95; margin-top: 15px; max-width: 600px; line-height: 1.4; font-weight: 500; }

        .system-list { margin-top: 60px; list-style: none; padding: 0; }
        .system-list li { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; font-size: 20px; font-weight: 600; }
        .system-list i { font-size: 28px; width: 40px; text-align: center; }

        .form-side {
            flex: 1;
            background: #ffffff;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            align-items: center;
            padding: 40px;
            box-sizing: border-box;
        }

        .login-card-boxed { width: 100%; max-width: 440px; background: white; border-radius: 8px; border: 1px solid var(--border); box-shadow: 0 10px 25px rgba(0,0,0,0.06); padding: 40px; box-sizing: border-box; }
        .login-header-boxed { margin-bottom: 35px; border-bottom: 1px solid #f1f5f9; padding-bottom: 20px; }
        .login-header-boxed h2 { font-size: 24px; font-weight: 800; color: var(--zf-dark); margin: 0; text-transform: uppercase; }

        .input-group { margin-bottom: 22px; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; color: #475569; margin-bottom: 10px; text-transform: uppercase; }
        .input-field { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 6px; font-size: 15px; box-sizing: border-box; background: #f8fafc; }

        .btn-login {
            width: 100%; padding: 16px; background: var(--zf-blue); color: white; border: none;
            border-radius: 6px; font-size: 16px; font-weight: 700; cursor: pointer;
            display: flex; align-items: center; justify-content: center; gap: 12px;
        }
        .btn-login:disabled { background: #94a3b8; }

        footer { width: 100%; text-align: center; padding: 20px 0; font-size: 12px; color: var(--text-gray); border-top: 1px solid #f1f5f9; }

        @media (max-width: 900px) {
            .login-container { flex-direction: column; }
            .brand-side { display: none; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-side">
            <div class="brand-content">
                <h1>ZF LOGISTICS</h1>
                <p class="subtitle">Sistem za najavu transporta i upravljanje rampama</p>
                <ul class="system-list">
                    <li><i class="fas fa-truck"></i> Ulazna kapija - Najava</li>
                    <li><i class="fas fa-warehouse"></i> Magacin - Rampe</li>
                    <li><i class="fas fa-door-open"></i> Izlazna kapija - Odlazak</li>
                </ul>
            </div>
        </div>

        <div class="form-side">
            <div class="login-form-wrapper">
                <div class="login-card-boxed">
                    <div class="login-header-boxed">
                        <h2>PRIJAVA</h2>
                        <p>Portal za upravljanje logistikom</p>
                    </div>

                    <form id="loginForm">
                        <div class="input-group">
                            <label>Korisničko ime</label>
                            <input type="text" id="username" class="input-field" placeholder="korisnik@zf.com" required>
                        </div>

                        <div class="input-group">
                            <label>Lozinka</label>
                            <input type="password" id="password" class="input-field" placeholder="••••••••" required>
                        </div>

                        <button type="submit" id="submitBtn" class="btn-login">
                             <i class="fas fa-sign-in-alt"></i> <span id="btnText">PRIJAVA</span>
                        </button>
                    </form>
                </div>
            </div>

            <footer>
                Aplikaciju razvio <strong>Dušan Kostić</strong> &copy; 2026. Ver 1.2 (Supabase)
            </footer>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

    <script>
        // TVOJI PODACI (Ažurirano sa ključem koji si poslao)
        const SUPABASE_URL = 'https://ljbqiavcibdlgmkkytkv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqYnFpYXZjaWJkbGdta2t5dGt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjI1MjksImV4cCI6MjA4OTA5ODUyOX0.YduSzl6hw4blu__CHbt4g7mrkjjaUUwbEY-HuFTEGIE';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            
            const btn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            
            btn.disabled = true;
            btnText.innerText = "PROVERA...";

            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();

            let targetPage = "";

            // 1. HARDKODIRANI KORISNICI (Ovo uvek radi)
            if (user === 'dusan.kostic@zf.com' && pass === 'Ninica1122!') targetPage = 'admin.html';
            else if (user === 'kapija@zf.com' && pass === '123') targetPage = 'gate.html';

            // 2. SUPABASE PROVERA
            if (targetPage === "") {
                try {
                    const { data, error } = await _supabase
                        .from('users')
                        .select('role')
                        .eq('username', user)
                        .eq('password', pass)
                        .maybeSingle();

                    if (error) throw error;

                    if (data) {
                        targetPage = data.role;
                    }
                } catch (err) {
                    console.error("Greška:", err.message);
                }
            }

            // REDIREKCIJA
            if (targetPage !== "") {
                if (!targetPage.endsWith('.html')) targetPage += '.html';
                sessionStorage.setItem('zf_user_logged', user);
                window.location.href = targetPage;
            } else {
                alert("Neispravno korisničko ime ili lozinka!");
                btn.disabled = false;
                btnText.innerText = "PRIJAVA";
            }
        };
    </script>
</body>
</html>
