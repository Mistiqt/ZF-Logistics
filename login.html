<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - ZF Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --zf-blue: #00549f; --zf-dark: #002e5d; --border: #e2e8f0; --bg: #f8fafc; }
        body { font-family: 'Inter', sans-serif; background: var(--bg); display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-card { background: white; padding: 40px; border-radius: 12px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); width: 100%; max-width: 400px; text-align: center; }
        .zf-logo { font-size: 40px; color: var(--zf-blue); margin-bottom: 20px; }
        h2 { margin-bottom: 30px; color: var(--zf-dark); font-weight: 800; text-transform: uppercase; }
        .form-group { text-align: left; margin-bottom: 20px; }
        .form-group label { display: block; font-size: 12px; font-weight: 700; color: #64748b; margin-bottom: 5px; text-transform: uppercase; }
        .form-group input { width: 100%; padding: 12px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; font-size: 14px; }
        .btn-login { width: 100%; padding: 14px; background: var(--zf-blue); color: white; border: none; border-radius: 6px; font-weight: 800; cursor: pointer; transition: 0.2s; text-transform: uppercase; }
        .btn-login:hover { background: var(--zf-dark); }
        .error-msg { color: #be123c; font-size: 13px; margin-top: 15px; display: none; font-weight: 600; }
    </style>
</head>
<body>

    <div class="login-card">
        <div class="zf-logo"><i class="fas fa-truck-loading"></i></div>
        <h2>ZF Logistics</h2>
        <div class="form-group">
            <label>Korisničko Ime</label>
            <input type="text" id="username" placeholder="Unesite email ili korisničko ime">
        </div>
        <div class="form-group">
            <label>Lozinka</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button class="btn-login" onclick="handleLogin()">Prijavi se</button>
        <div id="error" class="error-msg">Netačni podaci za pristup!</div>
    </div>

    <script>
        function handleLogin() {
            const userInp = document.getElementById('username').value.trim();
            const passInp = document.getElementById('password').value.trim();
            const errorEl = document.getElementById('error');

            // 1. DOHVATANJE KORISNIKA IZ LOCALSTORAGE-A (KLJUČ 'zf_users' KOJI KORISTI ADMIN)
            const users = JSON.parse(localStorage.getItem('zf_users')) || [];

            // 2. PROVJERA DA LI POSTOJI KORISNIK SA TIM PODACIMA
            const foundUser = users.find(u => u.username === userInp && u.password === passInp);

            if (foundUser) {
                // Ako nalog postoji, sačuvaj informaciju ko je ulogovan (opciono)
                sessionStorage.setItem('activeUser', JSON.stringify(foundUser));
                
                // Preusmjeravanje na stranicu za koju je nalog kreiran
                // foundUser.role sadrži npr. "gate.html" ili "admin.html"
                window.location.href = foundUser.role;
            } else {
                // Ako ne postoji, izbaci grešku
                errorEl.style.display = 'block';
                setTimeout(() => { errorEl.style.display = 'none'; }, 3000);
            }
        }

        // Dozvoli login na pritisak tastera Enter
        document.addEventListener('keypress', function (e) {
            if (e.key === 'Enter') handleLogin();
        });
    </script>
</body>
</html>
