<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZF Logistics - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --zf-blue: #00549f;
            --zf-dark: #002e5d;
            --border: #e2e8f0;
            --text-dark: #1e293b;
            --text-gray: #64748b;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .login-container { display: flex; min-height: 100vh; width: 100vw; flex-direction: row; }

        .brand-side {
            flex: 1;
            background: linear-gradient(135deg, var(--zf-dark) 0%, var(--zf-blue) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .brand-side::before {
            content: '';
            position: absolute;
            top: -10%; right: -10%;
            width: 400px; height: 400px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }

        .zf-logo-large {
            font-size: 80px;
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 10px;
            position: relative;
        }

        .brand-tagline { font-size: 18px; font-weight: 300; opacity: 0.9; letter-spacing: 1px; }

        .form-side {
            width: 450px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 60px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
        }

        .login-header h2 { font-size: 28px; font-weight: 800; color: var(--zf-dark); margin: 0 0 10px 0; }
        .login-header p { color: var(--text-gray); margin-bottom: 40px; font-size: 15px; }

        .input-group { margin-bottom: 25px; position: relative; }
        .input-group label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            color: var(--text-dark);
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .input-group i {
            position: absolute;
            left: 15px;
            top: 38px;
            color: var(--text-gray);
            font-size: 16px;
        }

        .input-group input {
            width: 100%;
            padding: 14px 14px 14px 45px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-family: 'Inter', sans-serif;
            transition: all 0.2s;
            box-sizing: border-box;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--zf-blue);
            box-shadow: 0 0 0 4px rgba(0, 84, 159, 0.1);
        }

        .btn-login {
            background: var(--zf-blue);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-login:hover { background: var(--zf-dark); }
        
        .footer-text {
            margin-top: 40px;
            font-size: 12px;
            color: var(--text-gray);
            text-align: center;
        }

        @media (max-width: 900px) {
            .brand-side { display: none; }
            .form-side { width: 100%; padding: 40px; }
        }
    </style>
</head>
<body>

    <div class="login-container">
        <div class="brand-side">
            <div class="zf-logo-large">ZF</div>
            <div class="brand-tagline">LOGISTICS & SUPPLY CHAIN</div>
        </div>

        <div class="form-side">
            <div class="login-header">
                <h2>Dobrodošli</h2>
                <p>Unesite vaše podatke za pristup sistemu</p>
            </div>

            <form id="loginForm">
                <div class="input-group">
                    <label>Korisničko Ime</label>
                    <i class="fas fa-envelope"></i>
                    <input type="text" id="username" placeholder="ime.prezime@zf.com" required>
                </div>

                <div class="input-group">
                    <label>Lozinka</label>
                    <i class="fas fa-lock"></i>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span>PRISTUPI SISTEMU</span>
                    <i class="fas fa-arrow-right"></i>
                </button>
            </form>

            <div class="footer-text">
                &copy; 2026 ZF Group | Sva prava zadržana
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script>
        // KREDENCIJALI KOJE SI DAO
        const SUPABASE_URL = 'https://ljbqiavcibdlgmkkytkv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqYnFpYXZjaWJkbGdta2t5dGt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjI1MjksImV4cCI6MjA4OTA5ODUyOX0.YduSzl6hw4blu__CHbt4g7mrkjjaUUwbEY-HuFTEGIE';
        const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        document.getElementById('loginForm').onsubmit = async (e) => {
            e.preventDefault();
            
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value.trim();
            const btn = document.getElementById('loginBtn');

            btn.disabled = true;
            btn.innerHTML = 'PROVERA...';

            try {
                // Provera u Supabase tabeli 'users'
                const { data, error } = await supabase
                    .from('users')
                    .select('username, password, role')
                    .eq('username', user)
                    .eq('password', pass)
                    .single();

                if (error || !data) {
                    alert("Neispravni podaci! Proverite korisničko ime i lozinku.");
                    btn.disabled = false;
                    btn.innerHTML = '<span>PRISTUPI SISTEMU</span> <i class="fas fa-arrow-right"></i>';
                    return;
                }

                // Uspešan login
                sessionStorage.setItem('zf_user_logged', data.username);
                sessionStorage.setItem('zf_user_role', data.role);
                
                // Redirekcija na osnovu role (uloge)
                window.location.href = data.role;

            } catch (err) {
                console.error("Greška:", err);
                alert("Došlo je do greške pri povezovanju sa serverom.");
                btn.disabled = false;
                btn.innerHTML = '<span>PRISTUPI SISTEMU</span> <i class="fas fa-arrow-right"></i>';
            }
        };
    </script>
</body>
</html>
