<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZF Logistics - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --zf-blue: #00549f; --zf-dark: #002e5d; --border: #e2e8f0; --text-dark: #1e293b; --text-gray: #64748b; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Inter', sans-serif; background-color: #f8fafc; }
        .login-container { display: flex; min-height: 100vh; width: 100vw; }
        .brand-side { flex: 1; background: url('pictures/images_enhanced.jpg') no-repeat center center; background-size: cover; position: relative; display: flex; flex-direction: column; justify-content: center; padding: 80px; color: white; }
        .brand-side::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 84, 159, 0.88); z-index: 1; }
        .brand-content { position: relative; z-index: 2; }
        .brand-content h1 { font-size: 64px; font-weight: 900; margin: 0; }
        .system-list { margin-top: 60px; list-style: none; padding: 0; }
        .system-list li { display: flex; align-items: center; gap: 20px; margin-bottom: 30px; font-size: 20px; font-weight: 600; }
        .form-side { flex: 1; background: #ffffff; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 40px; }
        .login-card-boxed { width: 100%; max-width: 440px; padding: 40px; border: 1px solid var(--border); border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.06); }
        .input-group { margin-bottom: 22px; }
        .input-group label { display: block; font-size: 13px; font-weight: 700; margin-bottom: 10px; }
        .input-field { width: 100%; padding: 14px; border: 1px solid var(--border); border-radius: 6px; box-sizing: border-box; }
        .btn-login { width: 100%; padding: 16px; background: var(--zf-blue); color: white; border: none; border-radius: 6px; font-weight: 700; cursor: pointer; }
        .error-alert { background: #fee2e2; color: #b91c1c; padding: 12px; border-radius: 6px; margin-bottom: 20px; display: none; text-align: center; font-size: 14px; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <div class="login-container">
        <div class="brand-side">
            <div class="brand-content">
                <h1>ZF LOGISTICS</h1>
                <p>Sistem za upravljanje transportom</p>
                <ul class="system-list">
                    <li><i class="fas fa-truck"></i> Najava kamiona</li>
                    <li><i class="fas fa-warehouse"></i> Upravljanje rampama</li>
                    <li><i class="fas fa-user-lock"></i> Administrator</li>
                </ul>
            </div>
        </div>
        <div class="form-side">
            <div class="login-card-boxed">
                <h2 style="color:var(--zf-dark); margin-bottom:20px;">PRIJAVA</h2>
                <div id="errorMsg" class="error-alert">Neispravno korisničko ime ili lozinka.</div>
                <div class="input-group">
                    <label>KORISNIČKO IME</label>
                    <input type="text" id="username" class="input-field" placeholder="Unesite email/korisničko ime">
                </div>
                <div class="input-group">
                    <label>LOZINKA</label>
                    <input type="password" id="password" class="input-field" placeholder="••••••••">
                </div>
                <button class="btn-login" onclick="login()">PRIJAVI SE</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://kxyjnditofshghyaxkpx.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imt4eWpuZGl0b2ZzaGdoeWF4a3B4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDEyMzYyNDIsImV4cCI6MjA1NjgxMjI0Mn0.NIn6eI0vBvYIuFpP0C_6G7Q6-oG5L3z_O-E6u9jH6-0";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        async function login() {
            const user = document.getElementById('username').value;
            const pass = document.getElementById('password').value;
            const errorBox = document.getElementById('errorMsg');

            const { data, error } = await _supabase
                .from('zf_users')
                .select('*')
                .eq('username', user)
                .eq('password', pass)
                .single();

            if (data) {
                window.location.href = data.role; // Prebacuje na gate.html, admin.html itd.
            } else {
                errorBox.style.display = 'block';
            }
        }
    </script>
</body>
</html>
