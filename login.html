<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZF Logistics - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --zf-blue: #00549f;
            --zf-dark: #002e5d;
            --border: #e2e8f0;
            --text-dark: #1e293b;
            --text-gray: #64748b;
        }

        body, html {
            margin: 0; padding: 0; height: 100%;
            font-family: 'Inter', sans-serif;
            background-color: #f8fafc;
        }

        .login-container { display: flex; min-height: 100vh; width: 100vw; flex-direction: row; }

        .brand-side {
            flex: 1;
            background: linear-gradient(135deg, var(--zf-dark) 0%, var(--zf-blue) 100%);
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            padding: 40px;
            position: relative;
            overflow: hidden;
        }

        .brand-side::before {
            content: '';
            position: absolute;
            top: -10%; right: -10%;
            width: 400px; height: 400px;
            background: rgba(255,255,255,0.05);
            border-radius: 50%;
        }

        .login-side {
            width: 500px;
            background: white;
            display: flex;
            flex-direction: column;
            justify-content: center;
            padding: 80px;
            box-shadow: -10px 0 30px rgba(0,0,0,0.05);
        }

        .zf-logo { font-size: 48px; font-weight: 900; margin-bottom: 10px; letter-spacing: -2px; }
        .app-badge { background: rgba(255,255,255,0.15); padding: 6px 15px; border-radius: 20px; font-size: 13px; font-weight: 600; text-transform: uppercase; margin-bottom: 30px; }

        .login-card h2 { font-size: 28px; font-weight: 800; color: var(--text-dark); margin: 0 0 10px 0; }
        .login-card p { color: var(--text-gray); margin-bottom: 35px; font-size: 15px; }

        .form-group { margin-bottom: 20px; position: relative; }
        .form-group i { position: absolute; left: 15px; top: 40px; color: var(--text-gray); font-size: 14px; }

        label { display: block; margin-bottom: 8px; font-size: 13px; font-weight: 700; color: var(--zf-dark); text-transform: uppercase; }

        input {
            width: 100%;
            padding: 14px 15px 14px 45px;
            border: 2px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            font-weight: 500;
            transition: all 0.3s;
            box-sizing: border-box;
        }

        input:focus { outline: none; border-color: var(--zf-blue); box-shadow: 0 0 0 4px rgba(0,84,159,0.1); }

        .btn-login {
            width: 100%;
            padding: 16px;
            background: var(--zf-blue);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 800;
            cursor: pointer;
            margin-top: 10px;
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .btn-login:hover { background: var(--zf-dark); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(0,0,0,0.1); }

        @media (max-width: 900px) {
            .brand-side { display: none; }
            .login-side { width: 100%; padding: 40px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="brand-side">
            <div class="zf-logo">ZF</div>
            <div class="app-badge">Logistics Management System</div>
            <div style="text-align: center; max-width: 300px; opacity: 0.8; font-size: 14px; line-height: 1.6;">
                Dobrodošli u interni sistem za upravljanje kretanjem vozila i magacinskim operacijama.
            </div>
        </div>
        <div class="login-side">
            <div class="login-card">
                <h2>Prijavite se</h2>
                <p>Unesite vaše pristupne podatke za nastavak.</p>
                
                <form id="loginForm">
                    <div class="form-group">
                        <label>Korisničko Ime</label>
                        <i class="fas fa-user"></i>
                        <input type="text" id="username" placeholder="ime.prezime@zf.com" required autocomplete="username">
                    </div>
                    <div class="form-group">
                        <label>Lozinka</label>
                        <i class="fas fa-lock"></i>
                        <input type="password" id="password" placeholder="••••••••" required autocomplete="current-password">
                    </div>
                    <button type="submit" class="btn-login">Pristupi Panelu</button>
                </form>
            </div>
            <div style="margin-top: auto; padding-top: 40px; border-top: 1px solid var(--border); font-size: 12px; color: var(--text-gray); text-align: center;">
                &copy; 2024 ZF Friedrichshafen AG | Logistics Division
            </div>
        </div>
    </div>

    <script>
        // Supabase Konfiguracija
        const SB_URL = "https://ljbqiavcibdlgmkkytkv.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqYnFpYXZjaWJkbGdta2t5dGt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjI1MjksImV4cCI6MjA4OTA5ODUyOX0.YduSzl6hw4blu__CHbt4g7mrkjjaUUwbEY-HuFTEGIE";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        document.getElementById('loginForm').onsubmit = async function(e) {
            e.preventDefault();
            const user = document.getElementById('username').value.trim().toLowerCase();
            const pass = document.getElementById('password').value;

            try {
                // Provjera u tabeli zf_users
                const { data, error } = await _supabase
                    .from('zf_users')
                    .select('*')
                    .eq('username', user)
                    .eq('password', pass)
                    .single();

                if (error || !data) {
                    alert("Neispravni podaci! Proverite korisničko ime i lozinku.");
                    return;
                }

                // Ako je uspješno, spremi sesiju i preusmjeri na stranicu definisanu u bazi (polje role)
                sessionStorage.setItem('zf_user_logged', user);
                window.location.href = data.role;

            } catch (err) {
                console.error("Greška pri logovanju:", err);
                alert("Došlo je do greške na serveru.");
            }
        };
    </script>
</body>
</html>
