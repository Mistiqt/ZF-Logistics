<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ulazna Kapija - ZF Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --zf-blue: #00549f;
            --zf-dark: #002e5d;
            --border: #e2e8f0;
            --bg: #f8fafc;
            --container-width: 1250px;
            --text-main: #1e293b;
            --text-muted: #64748b;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            margin: 0;
            color: var(--text-main);
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            width: 100%;
            background: white;
            border-bottom: 1px solid var(--border);
            height: 80px;
            display: flex;
            justify-content: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .header-content {
            width: var(--container-width);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 20px;
        }

        .header-left { display: flex; align-items: center; gap: 15px; }
        .zf-logo-square {
            background: var(--zf-blue);
            color: white;
            width: 42px;
            height: 42px;
            display: flex;
            justify-content: center;
            align-items: center;
            border-radius: 4px;
            font-size: 20px;
        }

        .header-title-wrapper h1 { margin: 0; font-size: 20px; font-weight: 800; text-transform: uppercase; color: var(--zf-dark); }
        .header-right { display: flex; align-items: center; gap: 15px; }

        .btn-logout {
            background: #f1f5f9;
            border: none;
            padding: 10px 18px;
            border-radius: 6px;
            color: var(--text-main);
            font-weight: 700;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 400px 1fr;
            gap: 30px;
            width: var(--container-width);
            margin: 30px 0;
            padding: 0 20px;
            box-sizing: border-box;
        }

        .panel {
            background: white;
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 25px;
            box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05);
        }

        .panel-title {
            font-size: 14px;
            font-weight: 800;
            color: var(--zf-dark);
            text-transform: uppercase;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .form-group { margin-bottom: 18px; }
        label { display: block; font-size: 12px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 8px; }
        
        input, select {
            width: 100%;
            padding: 12px;
            border: 2px solid var(--border);
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            box-sizing: border-box;
        }

        input:focus { outline: none; border-color: var(--zf-blue); }

        .btn-save {
            width: 100%;
            padding: 15px;
            background: var(--zf-blue);
            color: white;
            border: none;
            border-radius: 6px;
            font-weight: 800;
            font-size: 14px;
            cursor: pointer;
            text-transform: uppercase;
            margin-top: 10px;
        }

        .btn-save:disabled { background: #cbd5e1; cursor: not-allowed; }

        .list-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .refresh-indicator { font-size: 12px; color: var(--text-muted); display: flex; align-items: center; gap: 5px; }
        .refresh-indicator i.active { animation: spin 0.8s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        .truck-card {
            background: white;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 15px 20px;
            margin-bottom: 12px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: transform 0.2s;
        }

        .truck-card:hover { transform: translateX(5px); border-color: var(--zf-blue); }

        .truck-info h3 { margin: 0; font-size: 18px; font-weight: 800; color: var(--zf-blue); }
        .truck-info p { margin: 4px 0 0 0; font-size: 14px; font-weight: 600; color: var(--text-main); }
        .truck-meta { font-size: 12px; color: var(--text-muted); margin-top: 6px; display: flex; gap: 15px; }

        .status-badge {
            padding: 6px 12px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 800;
            text-transform: uppercase;
        }

        .status-waiting { background: #fff7ed; color: #9a3412; }
        .status-ramp { background: #f0fdf4; color: #166534; }
        .status-unloaded { background: #eff6ff; color: #1e40af; }

        .actions { display: flex; gap: 10px; }
        .btn-action {
            width: 36px; height: 36px;
            border-radius: 6px;
            border: 1px solid var(--border);
            background: white;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-muted);
        }

        .btn-edit:hover { color: var(--zf-blue); border-color: var(--zf-blue); }
        .btn-delete:hover { color: #ef4444; border-color: #ef4444; }

        .empty-state { text-align: center; padding: 40px; color: var(--text-muted); }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="header-left">
                <div class="zf-logo-square">ZF</div>
                <div class="header-title-wrapper">
                    <h1>ULAZNA KAPIJA</h1>
                    <div style="font-size: 12px; color: var(--text-muted); font-weight: 600;">Logistički Sistem Monitoringa</div>
                </div>
            </div>
            <div class="header-right">
                <button class="btn-logout" onclick="handleLogout()">
                    <i class="fas fa-sign-out-alt"></i> ODJAVA
                </button>
            </div>
        </div>
    </header>

    <div class="main-grid">
        <div class="panel">
            <div class="panel-title" id="formTitle">
                <i class="fas fa-truck-moving"></i> NAJAVA NOVOG VOZILA
            </div>
            
            <div class="form-group">
                <label>Registarska Oznaka</label>
                <input type="text" id="truckPlate" placeholder="Npr. BG-123-XY" oninput="checkFormValidity()">
            </div>

            <div class="form-group">
                <label>Prevoznik / Kompanija</label>
                <input type="text" id="companyName" placeholder="Naziv firme" oninput="checkFormValidity()">
            </div>

            <div class="form-group">
                <label>Tip Vozila</label>
                <select id="vehicleType" onchange="checkFormValidity()">
                    <option value="">Izaberi...</option>
                    <option value="Šleper">Šleper</option>
                    <option value="Kamion">Kamion</option>
                    <option value="Kombi">Kombi</option>
                    <option value="Drugo">Drugo</option>
                </select>
            </div>

            <div class="form-group">
                <label>Vrsta Robe / Razlog Dolaska</label>
                <input type="text" id="goodsType" placeholder="Npr. Delovi, Ambalaža..." oninput="checkFormValidity()">
            </div>

            <div class="form-group">
                <label>Broj Telefona Vozača</label>
                <input type="text" id="driverPhone" placeholder="06x / xxx-xxxx" oninput="checkFormValidity()">
            </div>

            <button class="btn-save" id="saveBtn" onclick="saveTruck()" disabled>EVIDENTIRAJ ULAZ</button>
            <button id="cancelEdit" onclick="resetForm()" style="display:none; width:100%; background:none; border:none; color:var(--text-muted); margin-top:10px; cursor:pointer; font-weight:700;">Otkaži izmenu</button>
        </div>

        <div class="panel">
            <div class="list-header">
                <div class="panel-title" style="margin:0;"><i class="fas fa-list"></i> TRENUTNO U FABRICI</div>
                <div class="refresh-indicator">
                    <i class="fas fa-sync-alt" id="refreshIcon"></i> Automatsko osvežavanje (5s)
                </div>
            </div>

            <div id="gateList">
                </div>
        </div>
    </div>

    <audio id="notifSound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <script>
        // SUPABASE CONFIG
        const SB_URL = "https://ljbqiavcibdlgmkkytkv.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqYnFpYXZjaWJkbGdta2t5dGt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjI1MjksImV4cCI6MjA4OTA5ODUyOX0.YduSzl6hw4blu__CHbt4g7mrkjjaUUwbEY-HuFTEGIE";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        let editId = null;

        async function renderGateList() {
            const icon = document.getElementById('refreshIcon');
            icon.classList.add('active');

            const { data: trucks, error } = await _supabase
                .from('zf_trucks')
                .select('*')
                .neq('status', 'IZAŠAO')
                .order('created_at', { ascending: false });

            icon.classList.remove('active');

            if (error) {
                console.error("Greška pri čitanju:", error);
                return;
            }

            const container = document.getElementById('gateList');
            if (!trucks || trucks.length === 0) {
                container.innerHTML = '<div class="empty-state">Nema aktivnih vozila u sistemu.</div>';
                return;
            }

            container.innerHTML = trucks.map(t => `
                <div class="truck-card">
                    <div class="truck-info">
                        <div style="display:flex; align-items:center; gap:10px;">
                            <h3>${t.plate}</h3>
                            <span class="status-badge ${getStatusClass(t.status)}">${t.status}</span>
                        </div>
                        <p>${t.company}</p>
                        <div class="truck-meta">
                            <span><i class="fas fa-truck"></i> ${t.vehicle}</span>
                            <span><i class="fas fa-box"></i> ${t.goods}</span>
                            <span><i class="fas fa-clock"></i> ${t.time}</span>
                        </div>
                    </div>
                    <div class="actions">
                        <button class="btn-action btn-edit" onclick="editTruck('${t.id}')"><i class="fas fa-edit"></i></button>
                        <button class="btn-action btn-delete" onclick="deleteTruck('${t.id}')"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `).join('');
        }

        function getStatusClass(status) {
            if (status === 'NA ČEKANJU') return 'status-waiting';
            if (status === 'NA RAMPI') return 'status-ramp';
            return 'status-unloaded';
        }

        async function saveTruck() {
            const truckData = {
                plate: document.getElementById('truckPlate').value.toUpperCase(),
                company: document.getElementById('companyName').value.toUpperCase(),
                vehicle: document.getElementById('vehicleType').value,
                goods: document.getElementById('goodsType').value,
                phone: document.getElementById('driverPhone').value
            };

            if (editId) {
                const { error } = await _supabase
                    .from('zf_trucks')
                    .update(truckData)
                    .eq('id', editId);
                
                if (!error) {
                    editId = null;
                    document.getElementById('saveBtn').innerText = "EVIDENTIRAJ ULAZ";
                    document.getElementById('formTitle').innerHTML = '<i class="fas fa-truck-moving"></i> NAJAVA NOVOG VOZILA';
                    document.getElementById('cancelEdit').style.display = 'none';
                }
            } else {
                truckData.status = 'NA ČEKANJU';
                truckData.date = new Date().toLocaleDateString('sr-RS');
                truckData.time = new Date().toLocaleTimeString('sr-RS', { hour: '2-digit', minute: '2-digit' });

                const { error } = await _supabase.from('zf_trucks').insert([truckData]);
                if (!error) playNotification();
            }

            resetForm();
            renderGateList();
        }

        async function editTruck(id) {
            const { data: t } = await _supabase.from('zf_trucks').select('*').eq('id', id).single();
            if (t) {
                document.getElementById('truckPlate').value = t.plate;
                document.getElementById('companyName').value = t.company;
                document.getElementById('vehicleType').value = t.vehicle;
                document.getElementById('goodsType').value = t.goods;
                document.getElementById('driverPhone').value = t.phone;

                editId = id;
                document.getElementById('saveBtn').innerText = "SAČUVAJ IZMENE";
                document.getElementById('formTitle').innerHTML = '<i class="fas fa-edit"></i> IZMENA PODATAKA';
                document.getElementById('cancelEdit').style.display = 'block';
                document.getElementById('saveBtn').disabled = false;
                window.scrollTo({top: 0, behavior: 'smooth'});
            }
        }

        async function deleteTruck(id) {
            if (confirm("Da li ste sigurni da želite da obrišete ovu najavu?")) {
                await _supabase.from('zf_trucks').delete().eq('id', id);
                renderGateList();
            }
        }

        function resetForm() {
            document.getElementById('truckPlate').value = '';
            document.getElementById('companyName').value = '';
            document.getElementById('vehicleType').value = '';
            document.getElementById('goodsType').value = '';
            document.getElementById('driverPhone').value = '';
            editId = null;
            document.getElementById('saveBtn').innerText = "EVIDENTIRAJ ULAZ";
            document.getElementById('formTitle').innerHTML = '<i class="fas fa-truck-moving"></i> NAJAVA NOVOG VOZILA';
            document.getElementById('cancelEdit').style.display = 'none';
            checkFormValidity();
        }

        function checkFormValidity() {
            const p = document.getElementById('truckPlate').value;
            const c = document.getElementById('companyName').value;
            const v = document.getElementById('vehicleType').value;
            const g = document.getElementById('goodsType').value;
            const ph = document.getElementById('driverPhone').value;
            document.getElementById('saveBtn').disabled = !(p && c && v && g && ph);
        }

        function playNotification() {
            const sound = document.getElementById('notifSound');
            sound.play().catch(e => console.log("Audio play blocked"));
        }

        function handleLogout() {
            if (confirm("Odjava?")) window.location.href = 'login.html';
        }

        // Inicijalizacija
        renderGateList();
        setInterval(renderGateList, 5000); // Auto refresh svakih 5 sekundi
    </script>
</body>
</html>
