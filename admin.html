<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistički Monitoring - ZF Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --zf-blue: #00549f; --zf-dark: #002e5d; --border: #e2e8f0; --bg: #f8fafc;
            --text-main: #1e293b; --text-muted: #64748b; --container-width: 1250px;
            --excel-green: #10b981; --excel-green-hover: #059669; --logout-red: #be123c;
            --stats-purple: #8b5cf6;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; color: var(--text-main); -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        header { background: white; border-bottom: 1px solid var(--border); height: 90px; display: flex; justify-content: center; width: 100%; position: sticky; top: 0; z-index: 100; }
        .header-content { width: var(--container-width); padding: 0 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .zf-logo-square { background: var(--zf-blue); color: white; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; border-radius: 4px; font-size: 22px; }
        .header-title-wrapper h1 { margin: 0; font-size: 22px; text-transform: uppercase; font-weight: 800; color: var(--zf-dark); line-height: 1; letter-spacing: -0.02em; }
        .page-description { font-size: 13px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }

        .filter-row { display: flex; gap: 15px; margin-top: 15px; padding: 15px; background: #f1f5f9; border-radius: 6px; align-items: flex-end; flex-wrap: wrap; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }
        .filter-group input { padding: 8px 12px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; font-family: inherit; outline: none; }

        .btn-zf-style { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 20px; border-radius: 6px; font-weight: 800; font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; text-transform: uppercase; border: none; font-family: 'Inter', sans-serif; }
        .btn-primary { background: var(--zf-blue); color: white; }
        .btn-primary:hover { background: var(--zf-dark); }
        .btn-export { background-color: var(--excel-green); color: white; }
        .btn-logout { background: white; border: 1px solid var(--border); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: var(--logout-red); }

        .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(150px, 1fr)); gap: 15px; width: 100%; max-width: var(--container-width); margin: 30px auto; padding: 0 20px; box-sizing: border-box; }
        .kpi-card { background: white; padding: 15px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .kpi-card .number { font-size: 26px; font-weight: 800; margin: 8px 0; color: var(--zf-dark); }

        .main-card { background: white; width: 100%; max-width: var(--container-width); margin: 0 auto 20px; border-radius: 8px; border: 1px solid var(--border); padding: 20px; box-sizing: border-box; }
        .table-scroll-wrapper { max-height: 500px; overflow: auto; margin-top: 10px; border: 1px solid #f1f5f9; }
        table { width: 100%; border-collapse: collapse; min-width: 900px; }
        th { text-align: left; padding: 12px; background: #f8fafc; font-size: 10px; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px solid var(--border); position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 12px; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .role-gate { background: #e0f2fe; color: #0369a1; } 
        .role-warehouse { background: #fff7ed; color: #c2410c; } 
        .role-exit { background: #dcfce7; color: #15803d; } 
        .role-admin { background: #f1f5f9; color: #1e293b; } 

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 90%; max-width: 400px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 12px; font-weight: 700; color: var(--text-muted); }
        .form-group input, .form-group select { padding: 10px; border: 1px solid var(--border); border-radius: 4px; }
        
        .action-btn { background: none; border: none; cursor: pointer; font-size: 14px; margin-left: 10px; }
        .btn-edit { color: var(--zf-blue); }
        .btn-delete { color: #be123c; }

        footer { width: 100%; text-align: center; padding: 20px 0; color: var(--text-muted); font-size: 13px; border-top: 1px solid var(--border); margin-top: auto; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <div class="zf-logo-square"><i class="fas fa-chart-line"></i></div>
                <div class="header-title-wrapper">
                    <h1>LOGISTIČKI MONITORING</h1>
                    <div class="page-description">Administrator Panel</div>
                </div>
            </div>
            <div style="display: flex; gap: 15px; align-items: center;">
                <button class="btn-zf-style btn-primary" onclick="openUserModal()">
                    <i class="fas fa-user-plus"></i> KREIRAJ NALOG
                </button>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> Odjava
                </button>
            </div>
        </div>
    </header>

    <div class="kpi-container">
        <div class="kpi-card"><h3>UKUPNO</h3><div class="number" id="count-total">0</div></div>
        <div class="kpi-card"><h3>PROS. ZADRŽAVANJE</h3><div class="number" id="avg-time">0</div></div>
    </div>

    <div class="main-card">
        <h2 style="font-size: 16px; font-weight: 800;"><i class="fas fa-users-cog"></i> UPRAVLJANJE KORISNICIMA</h2>
        <div class="table-scroll-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Korisničko Ime</th>
                        <th>Pristup</th>
                        <th style="text-align:right;">Akcije</th>
                    </tr>
                </thead>
                <tbody id="user-list-body"></tbody>
            </table>
        </div>
    </div>

    <footer>Aplikaciju razvio <strong>Dušan Kostić</strong> &copy; 2026.</footer>

    <div class="modal-overlay" id="userModal">
        <div class="modal-content">
            <h2 id="modal-title">Novi Korisnički Nalog</h2>
            <input type="hidden" id="edit-id">
            <div class="form-group"><label>Korisničko ime</label><input type="text" id="new-username"></div>
            <div class="form-group"><label>Lozinka</label><input type="password" id="new-password"></div>
            <div class="form-group">
                <label>Pristup stranici</label>
                <select id="new-access">
                    <option value="gate.html">Ulazna Kapija</option>
                    <option value="warehouse.html">Magacin</option>
                    <option value="exit-gate.html">Izlazna Kapija</option>
                    <option value="admin.html">Administrator Panel</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-zf-style btn-primary" style="flex: 1;" onclick="requestAdminAuth()">SAČUVAJ</button>
                <button class="btn-zf-style" style="flex: 1; background: #f1f5f9;" onclick="closeUserModal()">ODUSTANI</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-content" style="width: 320px; text-align: center;">
            <h3>Admin Potvrda</h3>
            <div class="form-group"><input type="password" id="auth-password" placeholder="Admin Lozinka" style="text-align: center;"></div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="auth-confirm-btn" class="btn-zf-style btn-primary" style="flex: 1;">POTVRDI</button>
                <button class="btn-zf-style" style="flex: 1;" onclick="closeAuthModal()">OTKAŽI</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "https://fihqifpnyenxunidmxer.supabase.co";
        const SB_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZpaHFpZnBueWVueHVuaWRteGVyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDEyMzcwMTgsImV4cCI6MjA1NjgxMzAxOH0.mC_9v-nL8zK_2UuL8u8u8u8u8u8u8u8u8u8u8u8u8u8";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);

        const ADMIN_PASS = "Ninica1122!";
        const roleConfig = {
            "gate.html": { label: "Ulazna Kapija", class: "role-gate" },
            "warehouse.html": { label: "Magacin", class: "role-warehouse" },
            "exit-gate.html": { label: "Izlazna Kapija", class: "role-exit" },
            "admin.html": { label: "Administrator", class: "role-admin" }
        };

        async function renderUserList() {
            const { data: users, error } = await _supabase.from('zf_users').select('*').order('username');
            const tbody = document.getElementById('user-list-body');
            tbody.innerHTML = '';

            if (users) {
                users.forEach(u => {
                    const config = roleConfig[u.role] || { label: u.role, class: "role-admin" };
                    tbody.innerHTML += `
                        <tr>
                            <td><strong>${u.username}</strong></td>
                            <td><span class="badge ${config.class}">${config.label}</span></td>
                            <td style="text-align:right;">
                                <button class="action-btn btn-edit" onclick="openUserModal('${u.id}', '${u.username}', '${u.password}', '${u.role}')"><i class="fas fa-edit"></i></button>
                                <button class="action-btn btn-delete" onclick="confirmDelete('${u.id}')"><i class="fas fa-trash-alt"></i></button>
                            </td>
                        </tr>`;
                });
            }
        }

        function openUserModal(id='', user='', pass='', role='gate.html') {
            document.getElementById('edit-id').value = id;
            document.getElementById('new-username').value = user;
            document.getElementById('new-password').value = pass;
            document.getElementById('new-access').value = role;
            document.getElementById('modal-title').innerText = id ? "Izmeni Nalog" : "Novi Nalog";
            document.getElementById('userModal').style.display = 'flex';
        }

        function requestAdminAuth() {
            if(!document.getElementById('new-username').value || !document.getElementById('new-password').value) return alert("Popunite sva polja!");
            
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('auth-password').focus();
            
            document.getElementById('auth-confirm-btn').onclick = async function() {
                if(document.getElementById('auth-password').value === ADMIN_PASS) {
                    await saveUser();
                } else alert("Pogrešna admin šifra!");
            };
        }

        async function saveUser() {
            const id = document.getElementById('edit-id').value;
            const userData = {
                username: document.getElementById('new-username').value.trim(),
                password: document.getElementById('new-password').value.trim(),
                role: document.getElementById('new-access').value
            };

            let result;
            if (id && id !== "undefined" && id !== "") {
                result = await _supabase.from('zf_users').update(userData).eq('id', id);
            } else {
                // Kod inserta NE šaljemo id, jer ga Supabase sam generiše
                result = await _supabase.from('zf_users').insert([userData]);
            }

            if(result.error) {
                alert("Greška: " + result.error.message);
            } else {
                closeAuthModal();
                closeUserModal();
                await renderUserList();
            }
        }

        async function confirmDelete(id) {
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('auth-confirm-btn').onclick = async function() {
                if(document.getElementById('auth-password').value === ADMIN_PASS) {
                    const { error } = await _supabase.from('zf_users').delete().eq('id', id);
                    if(error) alert(error.message);
                    closeAuthModal();
                    await renderUserList();
                } else alert("Pogrešna lozinka!");
            };
        }

        function closeUserModal() { document.getElementById('userModal').style.display = 'none'; }
        function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; document.getElementById('auth-password').value = ""; }
        function logout() { window.location.href = 'login.html'; }

        window.onload = renderUserList;
    </script>
</body>
</html>
