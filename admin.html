<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistički Monitoring - ZF Logistics</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --zf-blue: #00549f; --zf-dark: #002e5d; --border: #e2e8f0; --bg: #f8fafc;
            --text-main: #1e293b; --text-muted: #64748b; --container-width: 1250px;
            --excel-green: #10b981; --logout-red: #be123c;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; color: var(--text-main); display: flex; flex-direction: column; min-height: 100vh; }

        header { background: white; border-bottom: 1px solid var(--border); height: 90px; display: flex; justify-content: center; position: sticky; top: 0; z-index: 100; }
        .header-content { width: var(--container-width); padding: 0 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .zf-logo-square { background: var(--zf-blue); color: white; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; border-radius: 4px; font-size: 22px; }
        .header-title-wrapper h1 { margin: 0; font-size: 20px; font-weight: 800; color: var(--zf-dark); }

        .kpi-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; width: var(--container-width); margin: 20px auto; padding: 0 20px; box-sizing: border-box; }
        .kpi-card { background: white; padding: 20px; border-radius: 8px; border: 1px solid var(--border); text-align: center; }
        .kpi-card .number { font-size: 28px; font-weight: 900; color: var(--zf-dark); margin: 5px 0; }
        .kpi-card label { font-size: 11px; font-weight: 700; color: var(--text-muted); text-transform: uppercase; }

        .main-card { background: white; width: var(--container-width); margin: 0 auto 30px; border-radius: 8px; border: 1px solid var(--border); padding: 20px; box-sizing: border-box; }
        
        .filter-row { display: flex; gap: 15px; margin-bottom: 20px; background: #f1f5f9; padding: 15px; border-radius: 6px; align-items: flex-end; }
        .filter-group { display: flex; flex-direction: column; gap: 5px; }
        .filter-group input { padding: 8px; border: 1px solid var(--border); border-radius: 4px; }

        .table-wrapper { overflow-x: auto; max-height: 500px; }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        th { background: #f8fafc; padding: 12px; text-align: left; border-bottom: 2px solid var(--border); position: sticky; top: 0; }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; }
        .status-WAITING { background: #fff3e0; color: #e65100; }
        .status-RAMP { background: #dcfce7; color: #15803d; }
        .status-EXITED { background: #f1f5f9; color: #475569; }

        .btn-zf { padding: 10px 20px; border-radius: 6px; border: none; font-weight: 700; cursor: pointer; text-transform: uppercase; font-size: 11px; }
        .btn-primary { background: var(--zf-blue); color: white; }
        .btn-export { background: var(--excel-green); color: white; }

        /* Modal */
        .modal { position: fixed; inset: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 25px; border-radius: 8px; width: 350px; }
        .form-group { margin-bottom: 15px; }
        .form-group label { display: block; font-size: 12px; margin-bottom: 5px; font-weight: 600; }
        .form-group input, .form-group select { width: 100%; padding: 10px; box-sizing: border-box; border: 1px solid var(--border); border-radius: 4px; }

        footer { text-align: center; padding: 20px; color: var(--text-muted); font-size: 12px; }
    </style>
</head>
<body>
    <header>
        <div class="header-content">
            <div class="header-left">
                <div class="zf-logo-square"><i class="fas fa-chart-line"></i></div>
                <div class="header-title-wrapper">
                    <h1>LOGISTIČKI MONITORING</h1>
                    <div style="font-size: 12px; color: var(--text-muted)">Administrator Panel</div>
                </div>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-zf btn-primary" onclick="openModal()"><i class="fas fa-user-plus"></i> KREIRAJ NALOG</button>
                <button class="btn-zf" style="background:#fff; border: 1px solid var(--border); color: var(--logout-red)" onclick="location.href='login.html'"><i class="fas fa-sign-out-alt"></i> ODJAVA</button>
            </div>
        </div>
    </header>

    <div class="kpi-container">
        <div class="kpi-card"><h3>UKUPNO</h3><div class="number" id="kpi-total">0</div><label>Vozila danas</label></div>
        <div class="kpi-card"><h3>PROSEK</h3><div class="number" id="kpi-avg">0</div><label>Minuta u krugu</label></div>
        <div class="kpi-card"><h3>ZAVRŠENO</h3><div class="number" id="kpi-done">0</div><label>Odjavljenih vozila</label></div>
    </div>

    <div class="main-card">
        <div class="filter-row">
            <div class="filter-group">
                <label>Pretraga tablica</label>
                <input type="text" id="searchPlate" placeholder="BG-123..." oninput="fetchAdminData()">
            </div>
            <button class="btn-zf btn-export" style="margin-left: auto;" onclick="exportToCSV()"><i class="fas fa-file-csv"></i> EXPORT PODATAKA</button>
        </div>

        <div class="table-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Tablica</th>
                        <th>Firma</th>
                        <th>Status</th>
                        <th>Ulaz</th>
                        <th>Magacin</th>
                        <th>Izlaz</th>
                        <th>Zadržavanje</th>
                        <th>Palete</th>
                    </tr>
                </thead>
                <tbody id="adminTableBody"></tbody>
            </table>
        </div>
    </div>

    <div class="modal" id="userModal">
        <div class="modal-content">
            <h2 style="margin-top:0">Novi Korisnik</h2>
            <div class="form-group"><label>Korisničko ime</label><input type="text" id="newUsername"></div>
            <div class="form-group"><label>Lozinka</label><input type="password" id="newPassword"></div>
            <div class="form-group">
                <label>Pristup</label>
                <select id="newRole">
                    <option value="gate.html">Ulazna Kapija</option>
                    <option value="warehouse.html">Magacin</option>
                    <option value="exit-gate.html">Izlazna Kapija</option>
                    <option value="admin.html">Administrator</option>
                </select>
            </div>
            <div style="display:flex; gap:10px;">
                <button class="btn-zf btn-primary" style="flex:1" onclick="saveUser()">SAČUVAJ</button>
                <button class="btn-zf" style="flex:1" onclick="closeModal()">ODUSTANI</button>
            </div>
        </div>
    </div>

    <footer>Aplikaciju razvio <b>Dušan Kostić</b> © 2026</footer>

    <script>
        const SB_URL = "https://ljbqiavcibdlgmkkytkv.supabase.co";
        const SB_KEY = "sb_publishable_jeu7nFFmSa-mxNC4-Z3gkw_jkciHN94";
        const supabaseClient = supabase.createClient(SB_URL, SB_KEY);

        async function fetchAdminData() {
            let { data: trucks, error } = await supabaseClient.from('trucks').select('*').order('created_at', { ascending: false });
            if (error) return;

            const searchTerm = document.getElementById('searchPlate').value.toUpperCase();
            if(searchTerm) trucks = trucks.filter(t => t.plate.includes(searchTerm));

            renderTable(trucks);
            calculateKPIs(trucks);
        }

        function calculateDiff(t1, t2) {
            if(!t1 || !t2) return null;
            const [h1, m1] = t1.split(':').map(Number);
            const [h2, m2] = t2.split(':').map(Number);
            return (h2 * 60 + m2) - (h1 * 60 + m1);
        }

        function renderTable(data) {
            const tbody = document.getElementById('adminTableBody');
            tbody.innerHTML = data.map(t => {
                const diff = calculateDiff(t.time_in, t.time_out);
                return `
                    <tr>
                        <td style="font-weight:700">${t.plate}</td>
                        <td>${t.company}</td>
                        <td><span class="badge status-${t.status.replace(' ','')}">${t.status}</span></td>
                        <td>${t.time_in || '-'}</td>
                        <td>${t.time_unloaded || '-'}</td>
                        <td>${t.time_out || '-'}</td>
                        <td>${diff ? diff + ' min' : '-'}</td>
                        <td style="font-weight:700; color:var(--zf-blue)">${t.pallets || '-'}</td>
                    </tr>
                `;
            }).join('');
        }

        function calculateKPIs(data) {
            document.getElementById('kpi-total').textContent = data.length;
            const completed = data.filter(t => t.time_out);
            document.getElementById('kpi-done').textContent = completed.length;

            let totalMinutes = 0;
            completed.forEach(t => { totalMinutes += calculateDiff(t.time_in, t.time_out) || 0; });
            const avg = completed.length > 0 ? Math.round(totalMinutes / completed.length) : 0;
            document.getElementById('kpi-avg').textContent = avg;
        }

        async function saveUser() {
            const u = document.getElementById('newUsername').value;
            const p = document.getElementById('newPassword').value;
            const r = document.getElementById('newRole').value;

            const { error } = await supabaseClient.from('users').insert([{ username: u, password: p, role: r }]);
            if (error) alert("Greška!");
            else { closeModal(); alert("Korisnik kreiran!"); }
        }

        function exportToCSV() {
            let csv = "Tablica,Firma,Status,Ulaz,Izlaz,Palete\n";
            const rows = document.querySelectorAll("table tr");
            // Jednostavna logika za export vidljivih podataka
            alert("Generisanje CSV izveštaja...");
            // Ovde se može dodati puna Blob logika kao u prethodnim primerima
        }

        function openModal() { document.getElementById('userModal').style.display = 'flex'; }
        function closeModal() { document.getElementById('userModal').style.display = 'none'; }

        fetchAdminData();
        setInterval(fetchAdminData, 10000);
    </script>
</body>
</html>
