<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistički Monitoring - ZF Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        :root {
            --zf-blue: #00549f; --zf-dark: #002e5d; --border: #e2e8f0; --bg: #f8fafc;
            --text-main: #1e293b; --text-muted: #64748b; --container-width: 1250px;
            --excel-green: #10b981; --excel-green-hover: #059669; --logout-red: #be123c;
            --stats-purple: #8b5cf6;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; color: var(--text-main); -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        header { background: white; border-bottom: 1px solid var(--border); height: 90px; display: flex; justify-content: center; width: 100%; position: sticky; top: 0; z-index: 100; }
        .header-content { width: var(--container-width); padding: 0 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .zf-logo-square { background: var(--zf-blue); color: white; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; border-radius: 4px; font-size: 22px; }
        .header-title-wrapper h1 { margin: 0; font-size: 22px; text-transform: uppercase; font-weight: 800; color: var(--zf-dark); line-height: 1; letter-spacing: -0.02em; }
        .page-description { font-size: 13px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }

        .btn-zf-style { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 20px; border-radius: 6px; font-weight: 800; font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; text-transform: uppercase; border: none; font-family: 'Inter', sans-serif; }
        .btn-primary { background: var(--zf-blue); color: white; }
        .btn-primary:hover { background: var(--zf-dark); }
        .btn-logout { background: white; border: 1px solid var(--border); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: var(--logout-red); }

        .main-card { background: white; width: 100%; max-width: var(--container-width); margin: 20px auto; border-radius: 8px; border: 1px solid var(--border); padding: 20px; box-sizing: border-box; }
        .table-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; }
        .table-scroll-wrapper { max-height: 400px; overflow-y: auto; margin-top: 10px; border-radius: 4px; }
        table { width: 100%; border-collapse: collapse; }
        th { text-align: left; padding: 12px; background: #f8fafc; font-size: 10px; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .role-admin { background: #f1f5f9; color: #1e293b; border: 1px solid #e2e8f0; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 90%; max-width: 400px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .form-group label { font-size: 12px; font-weight: 700; color: var(--text-muted); }
        .form-group input, .form-group select { padding: 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 14px; }
        
        .action-btn { background: none; border: none; cursor: pointer; font-size: 14px; margin-left: 10px; }
        .btn-edit { color: var(--zf-blue); }
        .btn-delete { color: #be123c; }
    </style>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="header-left">
                <div class="zf-logo-square"><i class="fas fa-chart-line"></i></div>
                <div class="header-title-wrapper">
                    <h1>LOGISTIČKI MONITORING</h1>
                    <div class="page-description">Administrator Panel</div>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button class="btn-zf-style btn-primary" onclick="openUserModal()">
                    <i class="fas fa-user-plus"></i> KREIRAJ NALOG
                </button>
                <button class="btn-logout" onclick="logout()">Odjava</button>
            </div>
        </div>
    </header>

    <div class="main-card">
        <div class="table-header">
            <h2 style="font-size: 16px; font-weight: 800; margin: 0;"><i class="fas fa-users-cog"></i> UPRAVLJANJE KORISNICIMA</h2>
        </div>
        <div class="table-scroll-wrapper">
            <table>
                <thead>
                    <tr>
                        <th>Korisničko Ime</th>
                        <th>Pristup stranici</th>
                        <th style="text-align:right;">Akcije</th>
                    </tr>
                </thead>
                <tbody id="user-list-body"></tbody>
            </table>
        </div>
    </div>

    <div class="modal-overlay" id="userModal">
        <div class="modal-content">
            <h2 id="modal-title">Novi Korisnički Nalog</h2>
            <input type="hidden" id="edit-id">
            <div class="form-group">
                <label>Korisničko ime</label>
                <input type="text" id="new-username">
            </div>
            <div class="form-group">
                <label>Lozinka</label>
                <input type="password" id="new-password">
            </div>
            <div class="form-group">
                <label>Pristup stranici</label>
                <select id="new-access">
                    <option value="gate.html">Ulazna Kapija</option>
                    <option value="warehouse.html">Magacin</option>
                    <option value="exit-gate.html">Izlazna Kapija</option>
                    <option value="admin.html">Administrator Panel</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button class="btn-zf-style btn-primary" style="flex: 1;" onclick="requestAdminAuth()">SAČUVAJ</button>
                <button class="btn-zf-style" style="flex: 1; background: #f1f5f9;" onclick="closeUserModal()">ODUSTANI</button>
            </div>
        </div>
    </div>

    <div class="modal-overlay" id="authModal">
        <div class="modal-content" style="max-width: 320px; text-align: center;">
            <h3>Potvrda Admina</h3>
            <p style="font-size: 12px; color: gray;">Ukucaj admin lozinku da potvrdiš promenu</p>
            <div class="form-group">
                <input type="password" id="auth-password" placeholder="Admin Lozinka" style="text-align: center;">
            </div>
            <div style="display: flex; gap: 10px;">
                <button id="auth-confirm-btn" class="btn-zf-style btn-primary" style="flex: 1;">POTVRDI</button>
                <button class="btn-zf-style" style="flex: 1; background: #f1f5f9;" onclick="closeAuthModal()">ODUSTANI</button>
            </div>
        </div>
    </div>

    <script>
        const SB_URL = "TVOJ_SUPABASE_URL";
        const SB_KEY = "TVOJ_SUPABASE_ANON_KEY";
        const _supabase = supabase.createClient(SB_URL, SB_KEY);
        
        const ADMIN_PASS = "Ninica1122!";

        async function renderUserList() {
            const { data: users } = await _supabase.from('zf_users').select('*').order('id', {ascending: true});
            const tbody = document.getElementById('user-list-body');
            tbody.innerHTML = '';
            users?.forEach((u) => { 
                tbody.innerHTML += `<tr>
                    <td><strong>${u.username}</strong></td>
                    <td><span class="badge role-admin">${u.role}</span></td>
                    <td style="text-align:right;">
                        <button class="action-btn btn-edit" onclick="openUserModal('${u.id}', '${u.username}', '${u.password}', '${u.role}')"><i class="fas fa-edit"></i></button>
                        <button class="action-btn btn-delete" onclick="confirmDelete('${u.id}')"><i class="fas fa-trash-alt"></i></button>
                    </td></tr>`; 
            });
        }

        function openUserModal(id='', user='', pass='', role='gate.html') {
            document.getElementById('edit-id').value = id;
            document.getElementById('new-username').value = user;
            document.getElementById('new-password').value = pass;
            document.getElementById('new-access').value = role;
            document.getElementById('userModal').style.display = 'flex';
        }

        function closeUserModal() { document.getElementById('userModal').style.display = 'none'; }
        function closeAuthModal() { document.getElementById('authModal').style.display = 'none'; }

        // OVA FUNKCIJA SE POKREĆE KADA KLIKNEŠ "SAČUVAJ"
        function requestAdminAuth() {
            const u = document.getElementById('new-username').value;
            const p = document.getElementById('new-password').value;
            if(!u || !p) return alert("Popunite sva polja!");

            // Otvori modal za admin lozinku
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('auth-password').value = "";
            document.getElementById('auth-password').focus();

            // Podesi šta radi dugme "POTVRDI" u tom modalu
            document.getElementById('auth-confirm-btn').onclick = async function() {
                const input = document.getElementById('auth-password').value;
                if(input === ADMIN_PASS) {
                    await finalizeSave(); // Ako je lozinka tačna, šalji u bazu
                    closeAuthModal();
                } else {
                    alert("Pogrešna admin lozinka!");
                }
            };
        }

        async function finalizeSave() {
            const id = document.getElementById('edit-id').value;
            const userData = {
                username: document.getElementById('new-username').value.trim(),
                password: document.getElementById('new-password').value.trim(),
                role: document.getElementById('new-access').value
            };

            if(id) {
                await _supabase.from('zf_users').update(userData).eq('id', id);
            } else {
                await _supabase.from('zf_users').insert([userData]);
            }
            
            closeUserModal();
            renderUserList();
        }

        function confirmDelete(id) {
            document.getElementById('authModal').style.display = 'flex';
            document.getElementById('auth-confirm-btn').onclick = async function() {
                if(document.getElementById('auth-password').value === ADMIN_PASS) {
                    await _supabase.from('zf_users').delete().eq('id', id);
                    renderUserList();
                    closeAuthModal();
                } else alert("Netačna lozinka!");
            };
        }

        function logout() { window.location.href = 'login.html'; }
        window.onload = renderUserList;
    </script>
</body>
</html>
