<!DOCTYPE html>
<html lang="sr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logistički Monitoring - ZF Logistics</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --zf-blue: #00549f; --zf-dark: #002e5d; --border: #e2e8f0; --bg: #f8fafc;
            --text-main: #1e293b; --text-muted: #64748b; --container-width: 1250px;
            --excel-green: #10b981; --excel-green-hover: #059669; --logout-red: #be123c;
            --stats-purple: #8b5cf6;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; color: var(--text-main); -webkit-font-smoothing: antialiased; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }

        header { background: white; border-bottom: 1px solid var(--border); height: 90px; display: flex; justify-content: center; width: 100%; position: sticky; top: 0; z-index: 100; }
        .header-content { width: var(--container-width); padding: 0 20px; display: flex; justify-content: space-between; align-items: center; box-sizing: border-box; }
        .header-left { display: flex; align-items: center; gap: 15px; }
        .zf-logo-square { background: var(--zf-blue); color: white; width: 44px; height: 44px; display: flex; justify-content: center; align-items: center; border-radius: 4px; font-size: 22px; }
        .header-title-wrapper h1 { margin: 0; font-size: 22px; text-transform: uppercase; font-weight: 800; color: var(--zf-dark); line-height: 1; letter-spacing: -0.02em; }
        .page-description { font-size: 13px; color: var(--text-muted); margin-top: 4px; font-weight: 500; }

        .btn-zf-style { display: flex; align-items: center; justify-content: center; gap: 10px; padding: 12px 20px; border-radius: 6px; font-weight: 800; font-size: 12px; cursor: pointer; transition: all 0.2s; white-space: nowrap; text-transform: uppercase; border: none; font-family: 'Inter', sans-serif; }
        .btn-primary { background: var(--zf-blue); color: white; }
        .btn-logout { background: white; border: 1px solid var(--border); padding: 8px 16px; border-radius: 4px; cursor: pointer; font-size: 13px; font-weight: 600; display: flex; align-items: center; gap: 8px; color: var(--logout-red); }

        .main-card { background: white; width: 100%; max-width: var(--container-width); margin: 20px auto; border-radius: 8px; border: 1px solid var(--border); padding: 20px; box-sizing: border-box; }
        .table-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #f1f5f9; padding-bottom: 15px; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { text-align: left; padding: 12px; background: #f8fafc; font-size: 10px; color: var(--text-muted); text-transform: uppercase; border-bottom: 2px solid var(--border); }
        td { padding: 12px; border-bottom: 1px solid #f1f5f9; font-size: 13px; }

        .badge { padding: 4px 8px; border-radius: 4px; font-size: 10px; font-weight: 800; text-transform: uppercase; }
        .role-admin { background: #f1f5f9; color: #1e293b; }
        .role-gate { background: #e0f2fe; color: #0369a1; }

        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: white; padding: 30px; border-radius: 8px; width: 90%; max-width: 400px; }
        .form-group { margin-bottom: 15px; display: flex; flex-direction: column; gap: 5px; }
        .form-group input, .form-group select { padding: 10px; border: 1px solid var(--border); border-radius: 4px; }
        
        .action-btn { background: none; border: none; cursor: pointer; padding: 5px; }
        .btn-delete { color: #be123c; }
    </style>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>

    <header>
        <div class="header-content">
            <div class="header-left">
                <div class="zf-logo-square"><i class="fas fa-users-cog"></i></div>
                <div class="header-title-wrapper">
                    <h1>ADMIN PANEL</h1>
                    <div class="page-description">Upravljanje korisnicima i sistemom</div>
                </div>
            </div>
            <div style="display: flex; gap: 15px;">
                <button class="btn-zf-style btn-primary" onclick="openUserModal()">
                    <i class="fas fa-user-plus"></i> NOVI NALOG
                </button>
                <button class="btn-logout" onclick="logout()">
                    <i class="fas fa-sign-out-alt"></i> ODJAVA
                </button>
            </div>
        </div>
    </header>

    <div class="main-card">
        <div class="table-header">
            <h2 style="font-size: 16px; font-weight: 800; margin: 0;">KORISNIČKI NALOZI (Supabase)</h2>
        </div>
        <table>
            <thead>
                <tr>
                    <th>Korisničko Ime</th>
                    <th>Lozinka</th>
                    <th>Pristup (Role)</th>
                    <th style="text-align:right;">Akcije</th>
                </tr>
            </thead>
            <tbody id="user-list-body">
                </tbody>
        </table>
    </div>

    <div class="modal-overlay" id="userModal">
        <div class="modal-content">
            <h3>Korisnički Nalog</h3>
            <div class="form-group">
                <label>Korisničko ime</label>
                <input type="text" id="new-username" placeholder="ime.prezime@zf.com">
            </div>
            <div class="form-group">
                <label>Lozinka</label>
                <input type="text" id="new-password">
            </div>
            <div class="form-group">
                <label>Pristupna Stranica</label>
                <select id="new-role">
                    <option value="admin.html">Admin Panel</option>
                    <option value="gate.html">Ulazna Kapija</option>
                    <option value="warehouse.html">Magacin</option>
                    <option value="exit-gate.html">Izlazna Kapija</option>
                </select>
            </div>
            <div style="display: flex; gap: 10px;">
                <button class="btn-zf-style btn-primary" style="flex: 1;" onclick="saveUser()">SAČUVAJ</button>
                <button class="btn-zf-style" style="flex: 1; background: #eee;" onclick="closeUserModal()">PONIŠTI</button>
            </div>
        </div>
    </div>

    <script>
        // KORIŠĆENJE ISTIH PODATAKA KAO NA LOGINU
        const SUPABASE_URL = 'https://ljbqiavcibdlgmkkytkv.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImxqYnFpYXZjaWJkbGdta2t5dGt2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM1MjI1MjksImV4cCI6MjA4OTA5ODUyOX0.YduSzl6hw4blu__CHbt4g7mrkjjaUUwbEY-HuFTEGIE';
        
        const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

        // Učitavanje korisnika iz tabele 'users'
        async function fetchUsers() {
            const tbody = document.getElementById('user-list-body');
            tbody.innerHTML = '<tr><td colspan="4">Učitavanje...</td></tr>';

            const { data: users, error } = await _supabase
                .from('users')
                .select('*')
                .order('id', { ascending: false });

            if (error) {
                console.error(error);
                return;
            }

            tbody.innerHTML = '';
            users.forEach(u => {
                tbody.innerHTML += `
                    <tr>
                        <td style="font-weight:700;">${u.username}</td>
                        <td>${u.password}</td>
                        <td><span class="badge role-gate">${u.role}</span></td>
                        <td style="text-align:right;">
                            <button class="action-btn btn-delete" onclick="deleteUser(${u.id})">
                                <i class="fas fa-trash"></i>
                            </button>
                        </td>
                    </tr>
                `;
            });
        }

        async function saveUser() {
            const username = document.getElementById('new-username').value.trim();
            const password = document.getElementById('new-password').value.trim();
            const role = document.getElementById('new-role').value;

            if(!username || !password) return alert("Popuni sva polja!");

            const { error } = await _supabase
                .from('users')
                .insert([{ username, password, role }]);

            if (error) {
                alert("Greška pri čuvanju!");
                console.error(error);
            } else {
                closeUserModal();
                fetchUsers();
            }
        }

        async function deleteUser(id) {
            if(!confirm("Obrisati ovaj nalog?")) return;
            await _supabase.from('users').delete().eq('id', id);
            fetchUsers();
        }

        function openUserModal() { document.getElementById('userModal').style.display = 'flex'; }
        function closeUserModal() { document.getElementById('userModal').style.display = 'none'; }
        function logout() { sessionStorage.clear(); window.location.href = 'login.html'; }

        // Provera sesije (da neko ne uđe direktno na admin.html)
        if(!sessionStorage.getItem('zf_user_logged')) {
            window.location.href = 'login.html';
        } else {
            window.onload = fetchUsers;
        }
    </script>
</body>
</html>
